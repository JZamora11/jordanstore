<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JordanStore</title>

    <!-- Estilos CSS -->
    <link rel="stylesheet" href="./css/styles.css">

    <!-- Font DM Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="shortcut icon" href="./assets/img/favicon.png" type="image/x-icon">

    <!-- Javascript -->
    <script defer src="./js/main.js"></script>
</head>
<body>
    <!-- Header del sitio -->
    <header id="header">
        <h1>Jordan<span>Store</span></h1>
        <div class="carrito">
            <a href="./pages/carrito.html">
                <img src="./assets/img/shopping-bag.svg" alt="Icono de bolsa de compras">
            </a>
            <div id="contador-carrito" class="contador">0</div>
        </div>
    </header>

    <section class="bannerJordan">
        <img src="./assets/img/banner-jordan.webp" alt="" draggable="false">
    </section>

    <!-- Filtro de productos -->
    <section class="filtroSeccion">
        <h2>Filtros</h2>

        <div class="filtroFull">
            <div class="modelo">
                <select name="modelos" id="modelos">
                    <option value="all" selected>Modelo</option>
                    <option value="jordan-1">Jordan 1</option>
                    <option value="jordan-2">Jordan 2</option>
                    <option value="jordan-3">Jordan 3</option>
                </select>
            </div>

            <div class="orden">
                <select name="ordenProducto" id="ordenProducto">
                    <option value="all" selected>Ordenar por</option>
                    <option value="menor-precio">Menor precio</option>
                    <option value="mayor-precio">Mayor precio</option>
                </select>
            </div>

            <div class="busqueda">
                <input type="search" name="buscar" id="buscar" placeholder="Encuentra tus jordan perfectas...">
            </div>
        </div>
    </section>

    <!-- Sección de productos -->
    <main>
        <section class="listaProductos">
            <div id="container" class="container"></div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footerSite">
        <p>© Copyright 2026 - <span>JordanStore</span></p>
    </footer>
</body>
</html>
