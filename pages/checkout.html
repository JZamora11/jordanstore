<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | JordanStore</title>

    <!-- Estilos CSS -->
    <link rel="stylesheet" href="../css/styles.css">

    <!-- Font DM Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="shortcut icon" href="../assets/img/favicon.png" type="image/x-icon">

    <!-- Javascript -->
    <script defer src="../js/checkout.js"></script>
</head>
<body>
    <!-- Header del sitio -->
    <header id="header">
        <a href="../index.html"><h1>Jordan<span>Store</span></h1></a>
    </header>

    <!-- Contenido del carrito -->
    <main class="contenido-checkout">
        <section class="seccion-checkout">
            <div class="container-checkout">
                <h2>Proceso de pago</h2>

                <div class="container-form">
                    <form action="">
                        <h3>Datos personales</h3>
                        <div class="form-large">
                            <label for="nombre">Nombre y apellido<span>*</span></label>
                            <input type="text" id="nombre" required>
                        </div>
                        <div class="form-small-container">
                            <div class="form-small">
                                <label for="tel">Teléfono<span>*</span></label>
                                <input type="tel" maxlength="10" name="tel" id="tel" required>
                            </div>

                            <div class="form-small">
                                <label for="email">Correo electrónico<span>*</span></label>
                                <input type="email" name="email" id="email" required>
                            </div>
                        </div>

                        <hr>

                        <h3>Envío</h3>
                        <div class="form-small-container">
                            <div class="form-small">
                                <label for="direccion">Dirección<span>*</span></label>
                                <input type="text" name="direccion" id="direccion" required>
                            </div>

                            <div class="form-small">
                                <label for="ciudad">Ciudad<span>*</span></label>
                                <input type="text" name="ciudad" id="ciudad" required>
                            </div>
                        </div>

                        <hr>

                        <h3>Método de pago</h3>
                        <div class="form-large">
                            <label for="tarjeta">Número de tarjeta<span>*</span></label>
                            <input type="text" name="tarjeta" id="tarjeta" required>
                        </div>
                        <div class="form-small-container">
                            <div class="form-small">
                                <label for="expiracion">Fecha de expiración<span>*</span></label>
                                <input type="text" name="expiracion" id="expiracion" required>
                            </div>
                            <div class="form-small">
                                <label for="cvv">Código de seguridad (CVV)<span>*</span></label>
                                <input type="text" name="cvv" id="cvv" required>
                            </div>
                        </div>

                        <div class="form-large">
                            <button type="submit">
                                Proceder con el pago
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-arrow-narrow-right"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M5 12l14 0" /><path d="M15 16l4 -4" /><path d="M15 8l4 4" /></svg>
                            </button>
                        </div>

                        <p>* Obligatorio</p>
                    </form>
                </div>
            </div>
            
            <div class="container-derecha">
                <a href="./carrito.html" class="btn-volver"><< Volver al carrito</a>

                <aside id="resumen-compra" class="container-resumen">
                    <div>

                    </div>

                    <h2>Resumen de la compra</h2>
                    <hr>

                    <div class="subtotal">
                        <h4>Subtotal</h4>
                        <p id="subtotal-resumen"></p>
                    </div>

                    <div class="envio">
                        <h4>Envío</h4>
                        <p id="envio-resumen"></p>
                    </div>
                    <hr>

                    <div class="total-precio">
                        <h3>Total</h3>
                        <p id="total-pago"></p>
                    </div>
                </aside>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footerSite">
        <p>© Copyright 2026 - <span>JordanStore</span></p>
    </footer>
</body>
</html>
