<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito | JordanStore</title>

    <!-- Estilos CSS -->
    <link rel="stylesheet" href="../css/styles.css">

    <!-- Font DM Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="shortcut icon" href="../assets/img/favicon.png" type="image/x-icon">

    <!-- Javascript -->
    <script defer src="../js/carrito.js"></script>
</head>
<body>
    <!-- Header del sitio -->
    <header id="header">
        <a href="../index.html"><h1>Jordan<span>Store</span></h1></a>
    </header>

    <!-- Contenido del carrito -->
    <main class="contenido-carrito">
        <div class="titulo-carrito">
            <h2>Carrito de compras</h2>
            <hr>
        </div>

        <section class="seccionCarrito">
            <div id="contenedor-vacio"></div>
            <div id="carrito-total" class="container-carrito"></div>
            
            <div class="container-derecha">
                <a href="../index.html" class="btn-volver"><< Volver a JordanStore</a>

                <aside id="resumen-compra" class="container-resumen">
                    <h2>Resumen de la compra</h2>
                    <hr>

                    <div class="subtotal">
                        <h4>Subtotal</h4>
                        <p id="subtotal-resumen"></p>
                    </div>

                    <div class="envio">
                        <h4>Envío</h4>
                        <p id="envio-resumen"></p>
                    </div>
                    <hr>

                    <div class="total-precio">
                        <h3>Total</h3>
                        <p id="total-pago"></p>
                    </div>

                    <a href="./checkout.html" id="btn-continuar-pago" class="continuar-pago">
                        Proceder con el pago
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-arrow-narrow-right"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M5 12l14 0" /><path d="M15 16l4 -4" /><path d="M15 8l4 4" /></svg>
                    </a>

                    <p class="pago-texto">Pago seguro | JordanStore</p>
                </aside>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footerSite">
        <p>© Copyright 2026 - <span>JordanStore</span></p>
    </footer>
</body>
</html>
